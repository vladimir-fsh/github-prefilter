<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>GitHub PR Tab Rewriter — Overrides</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        max-width: 820px;
        margin: 24px auto;
        padding: 0 16px;
        color: #1f2328;
      }
      h1 { font-size: 18px; }
      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th, td {
        padding: 8px;
        border-bottom: 1px solid #d0d7de;
        text-align: left;
        vertical-align: top;
      }
      th { background: #f6f8fa; }
      td.url { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; word-break: break-all; }
      input.urlEdit {
        width: 100%;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        padding: 4px 6px;
        border: 1px solid #d0d7de;
        border-radius: 6px;
      }
      button {
        font-size: 12px;
        padding: 4px 8px;
        border: 1px solid #d0d7de;
        background: #f6f8fa;
        border-radius: 6px;
        cursor: pointer;
        margin-right: 4px;
      }
      button.danger { background: #cf222e; color: white; border-color: #a40e26; }
      button.primary { background: #1f883d; color: white; border-color: #1a7f37; }
      .empty { color: #57606a; font-style: italic; }
    </style>
  </head>
  <body>
    <h1>Saved overrides</h1>
    <table id="tbl">
      <thead>
        <tr><th>Repo</th><th>URL</th><th title="Redirect /pulls to filter on first open">Redirect</th><th></th></tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <p id="empty" class="empty" hidden>No overrides saved yet.</p>
    <script src="options.js"></script>
  </body>
</html>
