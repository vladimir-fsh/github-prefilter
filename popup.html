<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>GitHub PR Tab Rewriter</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        width: 360px;
        margin: 0;
        padding: 12px;
        color: #1f2328;
      }
      h1 { font-size: 14px; margin: 0 0 8px; }
      label { display: block; font-size: 12px; margin-top: 8px; color: #57606a; }
      input, textarea {
        width: 100%;
        box-sizing: border-box;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        padding: 6px;
        border: 1px solid #d0d7de;
        border-radius: 6px;
      }
      textarea { min-height: 80px; resize: vertical; }
      .row { display: flex; gap: 6px; margin-top: 10px; }
      button {
        font-size: 12px;
        padding: 6px 10px;
        border: 1px solid #d0d7de;
        background: #f6f8fa;
        border-radius: 6px;
        cursor: pointer;
      }
      button.primary { background: #1f883d; color: white; border-color: #1a7f37; }
      button.danger  { background: #cf222e; color: white; border-color: #a40e26; }
      .msg { font-size: 12px; margin-top: 8px; }
      .msg.error { color: #cf222e; }
      .msg.ok    { color: #1a7f37; }
      .muted     { color: #57606a; font-size: 11px; }
      a { color: #0969da; }
    </style>
  </head>
  <body>
    <h1>GitHub PR Tab Rewriter</h1>

    <label for="repo">Repo (owner/repo)</label>
    <input id="repo" placeholder="owner/repo" />

    <label for="url">Filtered Pull Requests URL</label>
    <textarea id="url" placeholder="https://github.com/owner/repo/pulls?q=..."></textarea>

    <div class="row">
      <button id="save" class="primary">Save</button>
      <button id="remove" class="danger">Remove</button>
      <button id="options">All overrides</button>
    </div>

    <div id="msg" class="msg"></div>

    <script src="popup.js"></script>
  </body>
</html>
