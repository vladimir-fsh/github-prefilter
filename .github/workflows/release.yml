name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from manifest
        id: ver
        run: |
          VERSION=$(node -e "console.log(require('./manifest.json').version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "::error::manifest.json version ($VERSION) does not match tag ($TAG)"
            exit 1
          fi

      - name: Pack extension
        run: |
          chmod +x ./scripts/pack.sh
          ./scripts/pack.sh

      - name: Upload zip to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ZIP="github-pr-tab-rewriter-${{ steps.ver.outputs.version }}.zip"
          # Create release if missing, then upload (clobber to allow re-runs)
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
          gh release upload "$GITHUB_REF_NAME" "$ZIP" --clobber
